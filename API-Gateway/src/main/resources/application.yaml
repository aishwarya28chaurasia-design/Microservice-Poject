spring:
  application:
    name: API-Gateway

  cloud:
    gateway:
      routes:
        - id: EMPLOYEE
          uri: lb://EMPLOYEE-SERVICE
          predicates:
            - Path=/employees/**
          filters:
            - AuthFilter

        - id: ADDRESS
          uri: lb://ADDRESS-SERVICE
          predicates:
            - Path=/addresses/**
          filters:
            - AuthFilter

        - id: AUTH
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

server:
  port: 9090

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}

  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka





